# OpenClaw - Personal AI Assistant
# See README.md for setup.
# Run from this directory: docker compose up -d
# Or from repo root: docker compose -f openclaw/docker-compose.yml --project-directory openclaw up -d
#
# Trust model: orchestrator/browser paradigm (see openclaw/OPENCLAW_SECURE.md and
#              docs/ARCHITECTURE_RFC.md Section 9).
#   - openclaw-gateway (orchestrator): holds all session credentials, full config volume
#   - openclaw-cli (browser-tier):     holds gateway token ONLY, workspace read-only, no secrets

services:
  openclaw-gateway:
    # Orchestrator tier: holds credentials, manages sessions, directs all agent work.
    image: ${OPENCLAW_IMAGE:-ghcr.io/phioranex/openclaw-docker:latest}
    container_name: openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      OPENCLAW_SKIP_SERVICE_CHECK: "true"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${BASE_PATH:-.}/data/openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    command: ["gateway", "--allow-unconfigured"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:18789"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 3

  openclaw-cli:
    # Browser-tier worker: receives gateway token ONLY — no session keys, no cloud credentials.
    # If compromised or prompt-injected, it cannot exfiltrate Claude/Anthropic session tokens.
    # Workspace is mounted read-only; config dir is NOT mounted (openclaw.json stays gateway-only).
    image: ${OPENCLAW_IMAGE:-ghcr.io/phioranex/openclaw-docker:latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_ENV: production
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      # CLAUDE_AI_SESSION_KEY, CLAUDE_WEB_SESSION_KEY, CLAUDE_WEB_COOKIE intentionally omitted.
      # Session credentials belong only to the orchestrator (openclaw-gateway).
    volumes:
      # Read-only: CLI can read workspace files but cannot modify config or access openclaw.json.
      - ${OPENCLAW_WORKSPACE_DIR:-${BASE_PATH:-.}/data/openclaw/workspace}:/home/node/.openclaw/workspace:ro
    stdin_open: true
    tty: true
    init: true
    restart: "no"
    entrypoint: ["node", "/app/dist/index.js"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
