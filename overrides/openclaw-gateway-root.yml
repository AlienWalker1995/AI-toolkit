# Run OpenClaw gateway as root inside the container (needed for apt/system installs via the agent).
# Security: only use on trusted hosts; the process can modify anything in the container filesystem.
#
#   docker compose -f docker-compose.yml -f overrides/openclaw-gateway-root.yml up -d openclaw-gateway
#
# Also set in .env:
#   OPENCLAW_UNRESTRICTED_GATEWAY_CONTAINER=1
# then: docker compose -f docker-compose.yml -f overrides/openclaw-gateway-root.yml run --rm openclaw-config-sync
#       docker compose -f docker-compose.yml -f overrides/openclaw-gateway-root.yml up -d openclaw-gateway

services:
  openclaw-gateway:
    user: "0:0"
